<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ZEMIAK 🥔</title>
<meta name="theme-color" content="#58733a">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --bg:#f7f1e7;--card:#fffaf1;--ink:#2b241d;--muted:#7c6b5b;--green:#58733a;--green2:#e2edd0;
  --orange:#dd8b32;--red:#b55341;--line:#eadfcd;--shadow:0 16px 45px rgba(52,38,20,.13);--r:26px
}
[data-theme="dark"]{--bg:#161914;--card:#22281d;--ink:#f6f0e5;--muted:#c7bcae;--green:#8dbb61;--green2:#34452c;--line:#34402f;--shadow:0 16px 45px rgba(0,0,0,.35)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at 0 0,#fff2bd,transparent 27%),radial-gradient(circle at 90% 12%,#d9efbf,transparent 28%),var(--bg);color:var(--ink)}
.app{max-width:520px;margin:0 auto;min-height:100svh;padding:14px 14px 90px}
.top{display:flex;align-items:center;justify-content:space-between;padding:14px 4px}
.brand{display:flex;gap:10px;align-items:center}
.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#efd47c,#b98345);display:grid;place-items:center;font-size:29px;box-shadow:var(--shadow)}
h1{font-size:26px;margin:0;letter-spacing:-.8px}.sub{font-size:13px;color:var(--muted);margin-top:1px}
.iconbtn{border:0;background:var(--card);color:var(--ink);border-radius:16px;padding:12px;box-shadow:var(--shadow);font-size:18px}
.hero{background:linear-gradient(135deg,var(--green),#7f9a42);color:white;border-radius:32px;padding:22px;margin:6px 0 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero:after{content:"🥔";position:absolute;right:-8px;bottom:-30px;font-size:128px;opacity:.18}
.hero h2{margin:0 0 8px;font-size:28px}.hero p{margin:0;opacity:.95}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:16px;position:relative;z-index:1}
.stat{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.22);border-radius:18px;padding:12px}
.stat b{display:block;font-size:18px}.stat span{font-size:12px;opacity:.9}
.tabs{display:flex;gap:8px;overflow:auto;padding:4px 0 14px;scrollbar-width:none}
.tab{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:10px 13px;border-radius:999px;font-weight:700}
.tab.active{background:var(--green);color:white;border-color:var(--green)}
.search{width:100%;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:18px;padding:14px 15px;margin:0 0 14px;font:inherit}
.grid{display:grid;gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.cardTop{height:112px;background:linear-gradient(135deg,#f7d77f,#e9f1d7);display:flex;align-items:center;justify-content:center;font-size:58px}
[data-theme="dark"] .cardTop{background:linear-gradient(135deg,#3a4329,#5f7134)}
.content{padding:16px}.content h3{font-size:21px;margin:0 0 7px;letter-spacing:-.4px}
.meta{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 12px}.pill{font-size:12px;border-radius:999px;padding:5px 8px;background:var(--green2);color:var(--green);font-weight:800}.pill.hot{background:#fff0d8;color:#8b5412}.pill.fav{background:#ffe2db;color:#9c3f31}
ul{margin:8px 0 0;padding-left:20px}li{margin:4px 0}.small{font-size:13px;color:var(--muted)}
.actions{display:flex;gap:8px;margin-top:14px}.btn{border:0;background:var(--green);color:white;border-radius:15px;padding:11px 12px;font-weight:800;flex:1}.btn.secondary{background:transparent;color:var(--green);border:1px solid var(--line)}
.nav{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(520px,calc(100% - 24px));background:rgba(255,250,241,.88);backdrop-filter:blur(16px);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:24px;display:grid;grid-template-columns:repeat(5,1fr);padding:8px;z-index:5}
[data-theme="dark"] .nav{background:rgba(34,40,29,.88)}
.nav button{border:0;background:transparent;color:var(--muted);padding:8px 2px;border-radius:16px;font-weight:800;font-size:11px}.nav button b{display:block;font-size:20px}.nav button.active{background:var(--green2);color:var(--green)}
.screen{display:none}.screen.active{display:block}
.form{display:grid;gap:10px}.input,textarea,select{width:100%;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:16px;padding:13px;font:inherit}textarea{min-height:90px}
.bigButton{border:0;border-radius:24px;padding:18px;background:linear-gradient(135deg,var(--orange),#b25b2e);color:white;box-shadow:var(--shadow);font-size:18px;font-weight:900;width:100%;margin:12px 0}
.empty{text-align:center;color:var(--muted);padding:28px;background:var(--card);border-radius:var(--r)}
.weightRow{display:grid;grid-template-columns:1fr auto;gap:8px}.bar{height:10px;background:var(--green2);border-radius:99px;overflow:hidden;margin-top:7px}.bar i{display:block;height:100%;background:var(--green);width:50%}
.recipeDetail{position:fixed;inset:0;background:var(--bg);z-index:10;overflow:auto;padding:18px;display:none}.recipeDetail.show{display:block}
.close{position:sticky;top:8px;margin-left:auto;display:block;width:46px;height:46px;border-radius:18px;border:0;background:var(--card);box-shadow:var(--shadow);color:var(--ink);font-size:20px}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand"><div class="logo">🥔</div><div><h1>ZEMIAK</h1><div class="sub">Ľubošova súkromná kuchárka</div></div></div>
    <button class="iconbtn" onclick="toggleTheme()">🌙</button>
  </div>

  <section id="home" class="screen active">
    <div class="hero">
      <h2>Ahoj Ľuboš 👋</h2>
      <p>Veľký tanier. Rozumné kalórie. Žiadne nočné kaiserky.</p>
      <div class="stats">
        <div class="stat"><b id="recipeCount">0</b><span>receptov</span></div>
        <div class="stat"><b id="lastWeight">—</b><span>posl. váha</span></div>
        <div class="stat"><b>🥔</b><span>hlavná zbraň</span></div>
      </div>
    </div>
    <button class="bigButton" onclick="randomRecipe()">🎲 Čo dnes variť?</button>
    <div id="todayPick"></div>
    <h2>⭐ Top recepty</h2>
    <div class="grid" id="favList"></div>
  </section>

  <section id="recipesScreen" class="screen">
    <input class="search" id="q" placeholder="Hľadať recept alebo surovinu..." oninput="renderRecipes()">
    <div class="tabs" id="tabs"></div>
    <div class="grid" id="recipes"></div>
  </section>

  <section id="addScreen" class="screen">
    <h2>➕ Nový recept</h2>
    <div class="form">
      <input class="input" id="name" placeholder="Názov">
      <input class="input" id="emoji" placeholder="Emoji napr. 🫛">
      <select class="input" id="cat"><option>Večera</option><option>Obed</option><option>Raňajky</option><option>Nočná rezerva</option><option>Dip</option><option>Víkend</option></select>
      <input class="input" id="kcal" placeholder="Kcal napr. 650">
      <input class="input" id="protein" placeholder="Bielkoviny napr. 55 g">
      <textarea id="ingredients" placeholder="Suroviny – každá na nový riadok"></textarea>
      <textarea id="steps" placeholder="Postup / poznámka"></textarea>
      <button class="bigButton" onclick="addRecipe()">Uložiť recept</button>
    </div>
  </section>

  <section id="night" class="screen">
    <h2>🌙 Nočný hlad</h2>
    <p class="small">Keď si hore, nemusíš byť hrdina. Len si vyber lepšiu možnosť než pečivo.</p>
    <div class="grid" id="nightOptions"></div>
  </section>

  <section id="progress" class="screen">
    <h2>📈 Váha</h2>
    <div class="weightRow">
      <input class="input" id="weightInput" placeholder="napr. 94.6">
      <button class="btn" onclick="addWeight()">Uložiť</button>
    </div>
    <div class="grid" id="weights" style="margin-top:14px"></div>
  </section>
</div>

<div class="recipeDetail" id="detail"></div>

<nav class="nav">
  <button class="active" onclick="show('home',this)"><b>🏠</b>Domov</button>
  <button onclick="show('recipesScreen',this)"><b>🍽️</b>Recepty</button>
  <button onclick="show('addScreen',this)"><b>➕</b>Pridať</button>
  <button onclick="show('night',this)"><b>🌙</b>Noc</button>
  <button onclick="show('progress',this)"><b>📈</b>Váha</button>
</nav>

<script>
const starter=[
{id:1,n:"Tvarohová klasika",e:"🥣",c:"Raňajky",k:"600–700",p:"54 g",fav:true,t:["bielkoviny","istota"],i:["250 g tvarohu","250 ml kefíru","30 g vločiek","15 g chia","10 g orechov","50–100 g ovocia"],s:"Premiešať. Toto sú raňajky, ktoré fungujú."},
{id:2,n:"Kura + zemiaky + kapusta",e:"🍗",c:"Večera",k:"600–750",p:"60–75 g",fav:true,t:["sýte","zemiaky"],i:["250–300 g kuracích pŕs","300–400 g zemiakov","150–250 g kyslej kapusty"],s:"Kura a zemiaky upiecť, kapustu dať bokom. Top večera."},
{id:3,n:"Pečené lusky",e:"🫛",c:"Večera",k:"100–170",p:"nízke",fav:true,t:["veľký objem","minimum kcal"],i:["400–500 g luskov","cesnak","údená paprika","soľ, korenie","trochu oleja alebo sprej"],s:"200 °C, 20–25 minút. V polovici premiešať."},
{id:4,n:"Tvarohový cesnakový dip",e:"🥣",c:"Dip",k:"250–300",p:"30 g",fav:false,t:["k zemiakom","k luskom"],i:["250 g tvarohu","1–2 PL kefíru","cesnak","pažítka/kôpor","soľ, korenie"],s:"Vymiešať na hustý dip. Namiesto omáčky."},
{id:5,n:"Tekvicový prívarok",e:"🎃",c:"Víkend",k:"podľa porcie",p:"podľa prílohy",fav:false,t:["frajer friendly"],i:["veľa tekvice","cibuľa","cesnak","kôpor","trochu mlieka/jogurtu","vajcia alebo kura"],s:"Hustiť zemiakom alebo trochou múky. Veľký objem."},
{id:6,n:"Kapustovo-zemiakový nákyp",e:"🥬",c:"Víkend",k:"330–400/porcia",p:"slušné",fav:false,t:["plech","na viac dní"],i:["300 g kyslej kapusty","300–400 g varených zemiakov","3 vajcia","40 g vločiek","cesnak, rasca, majoránka"],s:"Vrstva 2–3 cm. Piecť 35–45 min na 190–200 °C."},
{id:7,n:"3 vajcia + zemiaky",e:"🥚",c:"Obed",k:"400–500",p:"25 g",fav:true,t:["obed","menej hladu"],i:["3 vajcia","200–250 g zemiakov","paradajky/uhorka/kapusta"],s:"Upgrade oproti vajcia + len zelenina."},
{id:8,n:"Nočná rezerva",e:"🌙",c:"Nočná rezerva",k:"200–350",p:"podľa voľby",fav:true,t:["namiesto pečiva"],i:["250 g tvarohu alebo","400–500 ml kefíru alebo","zvyšok večere alebo","200–300 g zemiakov"],s:"Cieľ: žiadne tri kaiserky o druhej ráno."},
{id:9,n:"Zemiaky + tvaroh",e:"🥔",c:"Večera",k:"550–700",p:"35–45 g",fav:false,t:["bez mäsa"],i:["400–500 g zemiakov","250 g tvarohu","cesnak","kôpor/pažítka","kyslá kapusta"],s:"Jednoduché slovenské jedlo, len lepšie."}
];
let recipes=JSON.parse(localStorage.getItem("zemiakRecipes")||"null")||starter;
let weights=JSON.parse(localStorage.getItem("zemiakWeights")||"[]");
let activeCat="Všetko";
function save(){localStorage.setItem("zemiakRecipes",JSON.stringify(recipes));localStorage.setItem("zemiakWeights",JSON.stringify(weights))}
function show(id,btn){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderAll()}
function cats(){return ["Všetko",...Array.from(new Set(recipes.map(r=>r.c)))]}
function renderTabs(){tabs.innerHTML=cats().map(c=>`<button class="tab ${activeCat===c?'active':''}" onclick="activeCat='${c}';renderRecipes()">${c}</button>`).join("")}
function recipeCard(r){return `<article class="card"><div class="cardTop">${r.e}</div><div class="content"><h3>${r.n}</h3><div class="meta"><span class="pill hot">🔥 ${r.k} kcal</span><span class="pill">💪 ${r.p}</span>${r.fav?'<span class="pill fav">❤️ top</span>':''}</div><p class="small">${r.s}</p><div class="actions"><button class="btn" onclick="openRecipe(${r.id})">Otvoriť</button><button class="btn secondary" onclick="toggleFav(${r.id})">${r.fav?'❤️':'♡'}</button></div></div></article>`}
function renderRecipes(){renderTabs();let q=(document.getElementById("q")?.value||"").toLowerCase();let arr=recipes.filter(r=>(activeCat==="Všetko"||r.c===activeCat)&&JSON.stringify(r).toLowerCase().includes(q));recipes.innerHTML;document.getElementById("recipes").innerHTML=arr.map(recipeCard).join("")||'<div class="empty">Nič som nenašiel 😄</div>'}
function renderHome(){recipeCount.textContent=recipes.length;lastWeight.textContent=weights.length?weights[weights.length-1].v+" kg":"—";favList.innerHTML=recipes.filter(r=>r.fav).slice(0,3).map(recipeCard).join("")}
function renderNight(){nightOptions.innerHTML=recipes.filter(r=>r.c==="Nočná rezerva"||r.t.includes("namiesto pečiva")).map(recipeCard).join("")}
function renderWeights(){weights.innerHTML=weights.length?weights.slice().reverse().map(w=>`<div class="card"><div class="content"><h3>⚖️ ${w.v} kg</h3><p class="small">${w.d}</p></div></div>`).join(""):'<div class="empty">Zatiaľ žiadna váha.</div>'}
function renderAll(){renderHome();renderRecipes();renderNight();renderWeights()}
function openRecipe(id){let r=recipes.find(x=>x.id===id);detail.innerHTML=`<button class="close" onclick="detail.classList.remove('show')">×</button><div class="card"><div class="cardTop">${r.e}</div><div class="content"><h2>${r.n}</h2><div class="meta"><span class="pill hot">🔥 ${r.k} kcal</span><span class="pill">💪 ${r.p}</span><span class="pill">${r.c}</span></div><h3>Suroviny</h3><ul>${r.i.map(x=>`<li>${x}</li>`).join("")}</ul><h3>Postup</h3><p>${r.s}</p><button class="bigButton" onclick="toggleFav(${r.id});openRecipe(${r.id})">${r.fav?'❤️ Obľúbené':'♡ Pridať medzi obľúbené'}</button></div></div>`;detail.classList.add("show")}
function toggleFav(id){recipes=recipes.map(r=>r.id===id?{...r,fav:!r.fav}:r);save();renderAll()}
function addRecipe(){let r={id:Date.now(),n:name.value||"Nový recept",e:emoji.value||"🍽️",c:cat.value,k:kcal.value||"?",p:protein.value||"?",fav:false,t:["vlastné"],i:ingredients.value.split("\\n").filter(Boolean),s:steps.value||"Doplniť postup."};recipes.push(r);save();["name","emoji","kcal","protein","ingredients","steps"].forEach(id=>document.getElementById(id).value="");alert("Uložené 🥔");renderAll()}
function randomRecipe(){let r=recipes[Math.floor(Math.random()*recipes.length)];todayPick.innerHTML=recipeCard(r)}
function addWeight(){let v=weightInput.value.replace(",",".");if(!v)return;weights.push({v,d:new Date().toLocaleDateString("sk-SK")});weightInput.value="";save();renderAll()}
function toggleTheme(){document.documentElement.dataset.theme=document.documentElement.dataset.theme==="dark"?"":"dark"}
renderAll();
if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js")}
</script>
</body>
</html>
